# Isolated test stack for FastSaaS integration tests.
#
# FastSaaS port convention:
#   dev   = standard + 100  (postgres 5532, redis 6479, mailhog 1125/8125)
#   test  = standard + 200  (postgres 5632, redis 6579, mailhog 1225/8225)
#
# Run via ./run_test.sh — that script also sets the matching env vars and
# applies migrations before pytest runs. Compose project name is fastsaas-test
# so volumes / networks are isolated from the dev project (fastsaas).
services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: fastsaas
      POSTGRES_PASSWORD: dev
      POSTGRES_DB: fastsaas
    ports:
      - "5632:5432"
    volumes:
      - postgres_test_data:/var/lib/postgresql/data
      - ./infra/postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fastsaas -d fastsaas"]
      interval: 2s
      timeout: 3s
      retries: 20

  redis:
    image: redis:7-alpine
    ports:
      - "6579:6379"
    volumes:
      - redis_test_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 2s
      timeout: 3s
      retries: 20

  mailhog:
    image: mailhog/mailhog:latest
    ports:
      - "1225:1025"   # SMTP
      - "8225:8025"   # Web UI

volumes:
  postgres_test_data:
  redis_test_data:
